<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <!-- to right= branco para direita -->
    <!-- to left= branco para esqerda -->
    <!-- to top= branco para cima -->
    <!-- to bottom= branco para baixo -->
    <!-- 45deg= grau -->
    <style> 
        *{ /* configurações globais da css*/
            height: 100%;

        }
        body {
            background-image: linear-gradient(45deg, #F37C2A, #F599A8, #CC6B8C, #DA8EB2, #692067);
            background-attachment: fixed;
            /* deixa o degrade fixado */
            

        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
    
</body>
</html>
