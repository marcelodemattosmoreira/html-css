<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospetados localmente.</h1>
    <p>Esse videio esta hospedado no meu proprio servidor.</p>
    <p>Jeito de fazer com compatibilidade com navegadores.</p>
    <video width="250" poster="imagens/limoes-capa.png">
        <source src="midia/Meu-Video-1.mp4" type="video/mp4">
        <source src="midia/Meu-Video-2.webm" type="video/webm">
    
    </video>
    <p>Jeito mais fácil</p>
    <video src="midia/Meu-Video-1.mp4" width="250" controls poster="imagens/limoes-capa.png"></video>
    <h1>inserindo video do YouTube.</h1>
    <iframe poster="" width="560" height="315" src="https://www.youtube.com/embed/jPWsBuiy1rE?si=_P_TD-e9mSwRJuph&amp;start=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>
