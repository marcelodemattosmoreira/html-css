<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        /* bloco-level*/
        h1{
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkolivegreen;
            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            margin: 20px auto 60px auto;
            
            outline-width: 5px;
            outline-color: black;
            outline-style: dotted;
        }
        /* inline-level*/
        a{
            border: 5px solid red;
            padding: 5px 10px;
            margin: 20px;
            outline: 5px 10px 10px 5px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixas Box-Level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplo de inline-level.</a> Vamos ver na prática.</p>
    
</body>
</html>
