<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexível</title>
</head>
<body>
    <h1>Imagem Flexível</h1>
    <p>Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela para aproveitar a melhor experiência &#128522; </p>
    <picture>
        <source media="(max-width: 484px )" srcset="imagens/imagem.p.jpg" type="image/jpg">
        <source media="(max-width: 1350px)" srcset="imagens/imagem.m.jpg" type="image/jpg">
        <img src="imagens/imagem.g.jpg" alt="image-g">
    </picture>
    
</body>
</html>
