<!DOCTYPE html>
<html lang="pt-be">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos com Hover</title>
    <style>
        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
            background-color: red;
            color: white;
            width: 300px;
            height: 300px;
            
        }
        div > p:hover{
            background-color: blue;
            width: 300px;
            height: 300px;
        }
        div:hover{
            color: red;
            
        }
    </style>
</head>
<body>
    <h1>Exemplos com Hover</h1>
    <p>Passe o mouse sobre esse texto</p>
    <div>
        Passe a mouse aqui!!!
        <p>SURPRESA</p>
    </div>
    
</body>
</html>
